blueprint:
  name: Climate Cover Control
  description: >
    Heat-aware and sun-aware cover control per facade/exposure. Handles daily
    forecast maximum temperature, direct sun on the facade, per-day/workday
    opening schedules, optional vacation/absence modes, optional persistent
    status helper, partial hot-day reopening, and monthly sunset close offsets.
  domain: automation
  input:
    covers:
      name: Covers
      description: Covers/shutters controlled together for this facade. Prefer individual covers over a group if group states are unreliable.
      selector:
        entity:
          domain: cover
          multiple: true

    sun_direct_sensor:
      name: Facade direct-sun sensor
      description: >
        Optional binary sensor that is on while direct sun hits this facade/window group.
        Use it if you already have a precise facade sun sensor. If you prefer not to
        create a separate helper/sensor, set Sun detection mode to Solar window and
        configure the facade azimuth and +/- solar window below instead.
      default: ""
      selector:
        entity:
          domain: binary_sensor

    sun_detection_mode:
      name: Sun detection mode
      description: >
        How the blueprint decides that the sun is still hitting this facade.
        Direct sensor uses the optional binary sensor above. Solar window uses sun.sun
        azimuth/elevation directly. Direct sensor or solar window treats the facade as
        sunny when either method says it is sunny.
      default: direct_sensor
      selector:
        select:
          options:
            - label: Direct sensor only
              value: direct_sensor
            - label: Solar window only
              value: solar_window
            - label: Direct sensor or solar window
              value: direct_sensor_or_solar_window

    facade_azimuth:
      name: Facade azimuth
      description: >
        Direction perpendicular to the facade/wall, in degrees from North.
        Example: 145° means the facade points South-East. This is the center direction;
        the next two settings define how many degrees before and after this direction
        count as direct sun on the facade.
      default: 180
      selector:
        number:
          min: 0
          max: 359
          step: 1
          unit_of_measurement: °
          mode: box

    solar_window_before:
      name: Solar window before facade azimuth
      description: >
        Degrees to subtract from the facade azimuth to find the beginning of the sun
        window. Example: facade 145° with 65° before starts at 80°.
        Increase this if the facade heats early in the morning and covers must stay
        closed sooner.
      default: 90
      selector:
        number:
          min: 0
          max: 180
          step: 1
          unit_of_measurement: °
          mode: box

    solar_window_after:
      name: Solar window after facade azimuth
      description: >
        Degrees to add to the facade azimuth to find the end of the sun window.
        Example: facade 145° with 75° after ends at 220°. Increase or decrease this
        to tune when hot-day reopening is allowed after the sun leaves the facade.
      default: 90
      selector:
        number:
          min: 0
          max: 180
          step: 1
          unit_of_measurement: °
          mode: box

    solar_elevation_min:
      name: Minimum solar elevation
      description: >
        Minimum sun elevation, in degrees, required for the solar window to count as
        sunny. A small value such as 3° avoids reacting while the sun is still at the
        horizon.
      default: 3
      selector:
        number:
          min: -10
          max: 45
          step: 0.5
          unit_of_measurement: °
          mode: box

    status_helper:
      name: Optional status helper
      description: >
        Optional input_text used as persistent per-facade memory, inspired by CCA.
        It stores today's actions and forecast debug data to avoid repeated actions
        after reloads/restarts. Create one input_text per facade if used.
      default: ""
      selector:
        entity:
          domain: input_text

    weather_entity:
      name: Weather entity
      description: Must support weather.get_forecasts with type daily. The first daily forecast temperature is used as today's maximum.
      selector:
        entity:
          domain: weather

    heat_threshold:
      name: Hot-day threshold
      description: If today's forecast maximum is greater than or equal to this value, morning opening is blocked during active heat-protection months.
      default: 25
      selector:
        number:
          min: 15
          max: 45
          step: 0.5
          unit_of_measurement: °C
          mode: box

    heat_months:
      name: Heat-protection months
      description: Months where hot-day blocking is active. Outside these months, heat is ignored so covers can open for solar gains.
      default:
        - "5"
        - "6"
        - "7"
        - "8"
        - "9"
      selector:
        select:
          multiple: true
          options:
            - label: January
              value: "1"
            - label: February
              value: "2"
            - label: March
              value: "3"
            - label: April
              value: "4"
            - label: May
              value: "5"
            - label: June
              value: "6"
            - label: July
              value: "7"
            - label: August
              value: "8"
            - label: September
              value: "9"
            - label: October
              value: "10"
            - label: November
              value: "11"
            - label: December
              value: "12"

    respect_sunrise:
      name: Respect sunrise
      description: If enabled, covers will not open before sun.sun is above the horizon.
      default: true
      selector:
        boolean: {}

    monday_open_time:
      name: Monday opening time
      default: "07:30:00"
      selector: { time: {} }
    tuesday_open_time:
      name: Tuesday opening time
      default: "07:30:00"
      selector: { time: {} }
    wednesday_open_time:
      name: Wednesday opening time
      default: "07:30:00"
      selector: { time: {} }
    thursday_open_time:
      name: Thursday opening time
      default: "07:30:00"
      selector: { time: {} }
    friday_open_time:
      name: Friday opening time
      default: "07:30:00"
      selector: { time: {} }
    saturday_open_time:
      name: Saturday opening time
      default: "09:00:00"
      selector: { time: {} }
    sunday_open_time:
      name: Sunday opening time
      default: "09:00:00"
      selector: { time: {} }

    workday_sensor:
      name: Optional workday sensor
      description: If set, workday_open_time is used when on, and non_workday_open_time when off.
      default: ""
      selector:
        entity:
          domain: binary_sensor
    workday_open_time:
      name: Workday opening time
      default: "07:30:00"
      selector: { time: {} }
    non_workday_open_time:
      name: Non-workday opening time
      default: "09:00:00"
      selector: { time: {} }

    holiday_sensor:
      name: Optional holiday sensor
      default: ""
      selector:
        entity:
          domain: binary_sensor
    holiday_open_time:
      name: Holiday opening time
      default: "09:00:00"
      selector: { time: {} }

    vacation_sensor:
      name: Optional vacation sensor
      default: ""
      selector:
        entity:
          domain: binary_sensor
    vacation_mode:
      name: Vacation behavior
      default: normal
      selector:
        select:
          options:
            - label: Normal
              value: normal
            - label: Keep closed
              value: keep_closed
            - label: Open partially
              value: partial_open
    vacation_open_time:
      name: Vacation opening time
      default: "10:00:00"
      selector: { time: {} }
    vacation_open_position:
      name: Vacation opening position
      default: 30
      selector:
        number:
          min: 0
          max: 100
          step: 5
          unit_of_measurement: "%"
          mode: slider

    absence_sensor:
      name: Optional absence/security sensor
      description: If on, automatic opening is blocked. Evening closing remains active.
      default: ""
      selector:
        entity:
          domain: binary_sensor

    hot_after_sun_action:
      name: Hot-day action after facade sun ends
      description: What to do on hot days once direct sun no longer hits this facade.
      default: partial_open
      selector:
        select:
          options:
            - label: Do nothing
              value: none
            - label: Open partially
              value: partial_open
            - label: Open fully
              value: full_open
    hot_after_sun_position:
      name: Hot-day partial reopen position
      default: 40
      selector:
        number:
          min: 0
          max: 100
          step: 5
          unit_of_measurement: "%"
          mode: slider

    open_window_minutes:
      name: Normal opening window
      description: Minutes after the selected opening time during which normal opening may run. Limits reopen loops after manual closing.
      default: 45
      selector:
        number:
          min: 5
          max: 180
          step: 5
          unit_of_measurement: min
          mode: slider

    close_offset_jan:
      name: January close offset
      default: -15
      selector: { number: { min: -120, max: 120, step: 5, unit_of_measurement: min, mode: box } }
    close_offset_feb:
      name: February close offset
      default: -10
      selector: { number: { min: -120, max: 120, step: 5, unit_of_measurement: min, mode: box } }
    close_offset_mar:
      name: March close offset
      default: 0
      selector: { number: { min: -120, max: 120, step: 5, unit_of_measurement: min, mode: box } }
    close_offset_apr:
      name: April close offset
      default: 15
      selector: { number: { min: -120, max: 120, step: 5, unit_of_measurement: min, mode: box } }
    close_offset_may:
      name: May close offset
      default: 30
      selector: { number: { min: -120, max: 120, step: 5, unit_of_measurement: min, mode: box } }
    close_offset_jun:
      name: June close offset
      default: 45
      selector: { number: { min: -120, max: 120, step: 5, unit_of_measurement: min, mode: box } }
    close_offset_jul:
      name: July close offset
      default: 45
      selector: { number: { min: -120, max: 120, step: 5, unit_of_measurement: min, mode: box } }
    close_offset_aug:
      name: August close offset
      default: 35
      selector: { number: { min: -120, max: 120, step: 5, unit_of_measurement: min, mode: box } }
    close_offset_sep:
      name: September close offset
      default: 20
      selector: { number: { min: -120, max: 120, step: 5, unit_of_measurement: min, mode: box } }
    close_offset_oct:
      name: October close offset
      default: 5
      selector: { number: { min: -120, max: 120, step: 5, unit_of_measurement: min, mode: box } }
    close_offset_nov:
      name: November close offset
      default: -5
      selector: { number: { min: -120, max: 120, step: 5, unit_of_measurement: min, mode: box } }
    close_offset_dec:
      name: December close offset
      default: -15
      selector: { number: { min: -120, max: 120, step: 5, unit_of_measurement: min, mode: box } }

trigger:
  - platform: time_pattern
    minutes: "/5"
    id: tick
  - platform: homeassistant
    event: start
    id: start
  - platform: sun
    event: sunrise
    id: sunrise
  - platform: sun
    event: sunset
    id: sunset

mode: single
max_exceeded: silent

action:
  - service: weather.get_forecasts
    target:
      entity_id: !input weather_entity
    data:
      type: daily
    response_variable: daily_forecast

  - variables:
      covers: !input covers
      sun_direct_sensor: !input sun_direct_sensor
      sun_detection_mode: !input sun_detection_mode
      facade_azimuth: !input facade_azimuth
      solar_window_before: !input solar_window_before
      solar_window_after: !input solar_window_after
      solar_elevation_min: !input solar_elevation_min
      status_helper: !input status_helper
      weather_entity: !input weather_entity
      heat_threshold: !input heat_threshold
      heat_months: !input heat_months
      respect_sunrise: !input respect_sunrise
      workday_sensor: !input workday_sensor
      holiday_sensor: !input holiday_sensor
      vacation_sensor: !input vacation_sensor
      absence_sensor: !input absence_sensor
      vacation_mode: !input vacation_mode
      hot_after_sun_action: !input hot_after_sun_action
      hot_after_sun_position: !input hot_after_sun_position
      vacation_open_position: !input vacation_open_position
      open_window_minutes: !input open_window_minutes
      monday_open_time: !input monday_open_time
      tuesday_open_time: !input tuesday_open_time
      wednesday_open_time: !input wednesday_open_time
      thursday_open_time: !input thursday_open_time
      friday_open_time: !input friday_open_time
      saturday_open_time: !input saturday_open_time
      sunday_open_time: !input sunday_open_time
      workday_open_time: !input workday_open_time
      non_workday_open_time: !input non_workday_open_time
      holiday_open_time: !input holiday_open_time
      vacation_open_time: !input vacation_open_time
      close_offset_jan: !input close_offset_jan
      close_offset_feb: !input close_offset_feb
      close_offset_mar: !input close_offset_mar
      close_offset_apr: !input close_offset_apr
      close_offset_may: !input close_offset_may
      close_offset_jun: !input close_offset_jun
      close_offset_jul: !input close_offset_jul
      close_offset_aug: !input close_offset_aug
      close_offset_sep: !input close_offset_sep
      close_offset_oct: !input close_offset_oct
      close_offset_nov: !input close_offset_nov
      close_offset_dec: !input close_offset_dec
      wd: "{{ now().weekday() }}"
      per_day_open_time: >-
        {% set times = [monday_open_time, tuesday_open_time, wednesday_open_time, thursday_open_time, friday_open_time, saturday_open_time, sunday_open_time] %}
        {{ times[now().weekday()] }}
      workday_on: "{{ workday_sensor != '' and is_state(workday_sensor, 'on') }}"
      holiday_on: "{{ holiday_sensor != '' and is_state(holiday_sensor, 'on') }}"
      vacation_on: "{{ vacation_sensor != '' and is_state(vacation_sensor, 'on') }}"
      absence_on: "{{ absence_sensor != '' and is_state(absence_sensor, 'on') }}"
      selected_open_time: >-
        {% if vacation_on %}
          {{ vacation_open_time }}
        {% elif holiday_on %}
          {{ holiday_open_time }}
        {% elif workday_sensor != '' %}
          {{ workday_open_time if workday_on else non_workday_open_time }}
        {% else %}
          {{ per_day_open_time }}
        {% endif %}
      open_ts: "{{ as_timestamp(today_at(selected_open_time)) }}"
      now_ts: "{{ as_timestamp(now()) }}"
      open_due: "{{ now_ts >= open_ts }}"
      in_open_window: "{{ open_ts <= now_ts <= (open_ts + (open_window_minutes | int) * 60) }}"
      sunrise_ok: "{{ (not respect_sunrise) or is_state('sun.sun', 'above_horizon') }}"
      close_offset_min: >-
        {% set offsets = [close_offset_jan, close_offset_feb, close_offset_mar, close_offset_apr, close_offset_may, close_offset_jun, close_offset_jul, close_offset_aug, close_offset_sep, close_offset_oct, close_offset_nov, close_offset_dec] %}
        {{ offsets[now().month - 1] | int }}
      next_setting_ts: "{{ as_timestamp(state_attr('sun.sun', 'next_setting')) }}"
      sunset_today_ts: >-
        {% set ns = as_timestamp(state_attr('sun.sun', 'next_setting')) %}
        {% set n = as_timestamp(now()) %}
        {{ ns if ns > n and (ns - n) < 43200 else ns - 86400 }}
      close_ts: "{{ (sunset_today_ts | float) + (close_offset_min | int) * 60 }}"
      close_due: "{{ now_ts >= (close_ts | float) }}"
      forecast_today_max: >-
        {% set f = daily_forecast.get(weather_entity, {}).get('forecast', []) %}
        {% if f | length > 0 and f[0].temperature is defined %}
          {{ f[0].temperature | float }}
        {% else %}
          {{ state_attr(weather_entity, 'temperature') | float(-99) }}
        {% endif %}
      heat_month_active: "{{ (now().month | string) in (heat_months | list) }}"
      hot_day: "{{ heat_month_active and (forecast_today_max | float >= heat_threshold | float) }}"
      direct_sensor_sunny: "{{ sun_direct_sensor != '' and is_state(sun_direct_sensor, 'on') }}"
      sun_azimuth: "{{ state_attr('sun.sun', 'azimuth') | float(0) }}"
      sun_elevation: "{{ state_attr('sun.sun', 'elevation') | float(-90) }}"
      solar_window_configured: >-
        {{ facade_azimuth not in [none, ''] and solar_window_before not in [none, ''] and solar_window_after not in [none, ''] and solar_elevation_min not in [none, ''] }}
      solar_window_start: "{{ ((facade_azimuth | float(0)) - (solar_window_before | float(0))) % 360 }}"
      solar_window_end: "{{ ((facade_azimuth | float(0)) + (solar_window_after | float(0))) % 360 }}"
      solar_window_sunny: >-
        {% set az = sun_azimuth | float %}
        {% set el = sun_elevation | float %}
        {% set start = solar_window_start | float %}
        {% set end = solar_window_end | float %}
        {% set in_azimuth_window = (start <= end and start <= az <= end) or (start > end and (az >= start or az <= end)) %}
        {{ solar_window_configured and el >= (solar_elevation_min | float(0)) and in_azimuth_window }}
      facade_sunny: >-
        {% if sun_detection_mode == 'direct_sensor' %}
          {{ direct_sensor_sunny }}
        {% elif sun_detection_mode == 'solar_window' %}
          {{ solar_window_sunny }}
        {% else %}
          {{ direct_sensor_sunny or solar_window_sunny }}
        {% endif %}
      today_key: "{{ now().date() | string }}"
      helper_data: >-
        {% if status_helper != '' %}
          {{ states(status_helper) | from_json(default={}) }}
        {% else %}
          {{ {} }}
        {% endif %}
      opened_today: "{{ helper_data.get('opened') == today_key }}"
      hot_reopened_today: "{{ helper_data.get('hot_reopened') == today_key }}"
      closed_today: "{{ helper_data.get('closed') == today_key }}"
      any_not_open: >-
        {{ expand(covers) | selectattr('state', 'ne', 'open') | list | count > 0 }}
      any_not_closed: >-
        {{ expand(covers) | selectattr('state', 'ne', 'closed') | list | count > 0 }}

  - choose:
      # Evening close: priority path, still active during absence/vacation.
      - conditions:
          - condition: template
            value_template: "{{ close_due and any_not_closed and not closed_today }}"
        sequence:
          - service: cover.close_cover
            target:
              entity_id: !input covers
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ status_helper != '' }}"
                sequence:
                  - service: input_text.set_value
                    data:
                      entity_id: "{{ status_helper }}"
                      value: >-
                        {{ dict(helper_data, v=1, closed=today_key, last_action='close', forecast_max=forecast_today_max | float, heat_month_active=heat_month_active, hot_day=hot_day, ts=as_timestamp(now()) | int) | to_json }}

      # Hot-day reopening once the facade is no longer sunny.
      - conditions:
          - condition: trigger
            id:
              - start
              - tick
          - condition: template
            value_template: >-
              {{ hot_day and open_due and sunrise_ok and not facade_sunny and not absence_on and any_not_open and hot_after_sun_action != 'none' and not hot_reopened_today }}
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ hot_after_sun_action == 'partial_open' }}"
                sequence:
                  - service: cover.set_cover_position
                    target:
                      entity_id: !input covers
                    data:
                      position: !input hot_after_sun_position
            default:
              - service: cover.open_cover
                target:
                  entity_id: !input covers
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ status_helper != '' }}"
                sequence:
                  - service: input_text.set_value
                    data:
                      entity_id: "{{ status_helper }}"
                      value: >-
                        {{ dict(helper_data, v=1, hot_reopened=today_key, last_action='hot_reopen', forecast_max=forecast_today_max | float, heat_month_active=heat_month_active, hot_day=hot_day, ts=as_timestamp(now()) | int) | to_json }}

      # Normal opening within a short window after the selected opening time.
      - conditions:
          - condition: trigger
            id:
              - tick
              - start
              - sunrise
          - condition: template
            value_template: >-
              {{ open_due and in_open_window and sunrise_ok and not hot_day and not absence_on and any_not_open and not opened_today and not (vacation_on and vacation_mode == 'keep_closed') }}
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ vacation_on and vacation_mode == 'partial_open' }}"
                sequence:
                  - service: cover.set_cover_position
                    target:
                      entity_id: !input covers
                    data:
                      position: !input vacation_open_position
            default:
              - service: cover.open_cover
                target:
                  entity_id: !input covers
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ status_helper != '' }}"
                sequence:
                  - service: input_text.set_value
                    data:
                      entity_id: "{{ status_helper }}"
                      value: >-
                        {{ dict(helper_data, v=1, opened=today_key, last_action='open', forecast_max=forecast_today_max | float, heat_month_active=heat_month_active, hot_day=hot_day, ts=as_timestamp(now()) | int) | to_json }}
